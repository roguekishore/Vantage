<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800;900&display=swap');

    :root {
      --bg:         #09090b;
      --fg:         #ffffff;
      --card:       #0d0d10;
      --muted:      rgba(255,255,255,0.03);
      --muted-fg:   rgba(255,255,255,0.32);
      --primary:    #EDFF66;
      --primary-fg: #09090b;
      --border:     rgba(255,255,255,0.06);
      --radius:     16px;
      --accent:     #EDFF66;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      cursor: default; /* Extensions don't easily support custom cursors like the main app */
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 14px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .brand { display: flex; align-items: center; gap: 10px; }

    .brand-mark {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      display: block;
      object-fit: cover;
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 16px;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--fg);
      font-family: 'Syne', sans-serif;
    }

    .chip {
      font-size: 9px;
      font-weight: 900;
      color: rgba(255,255,255,0.22);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      white-space: nowrap;
    }

    /* Body */
    .body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Account card */
    .account-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
    }
    
    .account-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, rgba(237,255,102,0.6), transparent);
    }

    .account-card-inner {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .account-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .account-sep {
      height: 1px;
      background: var(--border);
      margin: 2px 0;
    }

    .account-label {
      font-size: 9px;
      font-weight: 900;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted-fg);
      margin-bottom: 4px;
    }

    .account-value {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--fg);
    }

    .account-value.empty {
      color: var(--muted-fg);
      font-style: italic;
      font-weight: 400;
      font-family: inherit;
      font-size: 12px;
    }

    .lc-indicator {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }

    .lc-indicator.on {
      background: #34d399;
      box-shadow: 0 0 6px rgba(52,211,153,0.6);
    }

    .auth-chip {
      font-size: 9px;
      font-weight: 900;
      padding: 3px 9px;
      border-radius: 6px;
      border: 1px solid var(--border);
      color: rgba(255,255,255,0.38);
      background: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .auth-chip.match {
      background: rgba(52,211,153,0.08);
      border-color: rgba(52,211,153,0.22);
      color: #34d399;
    }

    .auth-chip.mismatch {
      background: rgba(248,113,113,0.08);
      border-color: rgba(248,113,113,0.22);
      color: #f87171;
    }

    /* Description */
    .desc {
      font-size: 12px;
      color: var(--muted-fg);
      line-height: 1.6;
    }

    /* Button */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      height: 46px;
      padding: 0 24px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      border: none;
      background: var(--primary);
      color: var(--primary-fg);
      font-family: inherit;
      transition: opacity 0.15s;
    }

    .btn:hover:not(:disabled)  { opacity: 0.86; }
    .btn:disabled              { opacity: 0.4; cursor: not-allowed; }

    .btn-spin {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(9,9,11,0.25);
      border-top-color: var(--primary-fg);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Status box - converted to indicator dot + text */
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted-fg);
      margin-top: -4px;
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      flex-shrink: 0;
    }

    .status.idle .status-dot { background: rgba(255,255,255,0.18); }
    .status.busy .status-dot { display: none; }
    .status.ok { color: #34d399; }
    .status.ok .status-dot { background: #34d399; box-shadow: 0 0 5px rgba(52,211,153,0.5); }
    .status.fail { color: #f87171; }
    .status.fail .status-dot { background: #f87171; box-shadow: 0 0 5px rgba(248,113,113,0.5); }

    .status-spin {
      width: 10px;
      height: 10px;
      border: 1.5px solid rgba(255,255,255,0.1);
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      display: none;
      flex-shrink: 0;
    }

    .status.busy .status-spin { display: block; }
    .status.busy { color: #60a5fa; }

    /* Sign-in prompt */
    .signin-prompt {
      display: none;
      font-size: 12px;
      color: #fb923c;
      background: rgba(251,146,60,0.1);
      border: 1px solid rgba(251,146,60,0.2);
      border-radius: 10px;
      padding: 12px 14px;
      line-height: 1.5;
    }

    .signin-prompt a {
      color: #fbbf24;
      text-decoration: underline;
      font-weight: 700;
    }

    .signin-prompt a:hover { color: #fde68a; }

    /* Footer */
    .footer {
      padding: 16px 20px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .footer a { color: rgba(255,255,255,0.3); text-decoration: none; transition: color 0.15s; }
    .footer a:hover { color: #ffffff; }
  </style>
</head>
<body>

  <div class="header">
    <div class="brand">
      <img class="brand-mark" src="algo.svg" alt="Vantage logo" />
      <span class="brand-name">Vantage</span>
    </div>
    <span class="chip">LC Sync</span>
  </div>

  <div class="body">

    <div class="account-card">
      <div class="account-card-inner">
        <!-- Row 1: currently active LeetCode session -->
        <div class="account-row">
          <div>
            <div class="account-label">LC Session</div>
            <div class="account-value empty" id="lcUser">Checking...</div>
          </div>
          <div class="lc-indicator" id="lcDot"></div>
        </div>

        <div class="account-sep"></div>

        <!-- Row 2: lcusername the app has on file -->
        <div class="account-row">
          <div>
            <div class="account-label">App Linked</div>
            <div class="account-value empty" id="appLinkedUser">Not synced</div>
          </div>
          <div class="auth-chip" id="authChip">&mdash;</div>
        </div>
      </div>
    </div>

    <p class="desc">
      Sync your accepted LeetCode solutions to Vantage to update your world map and stats.
    </p>

    <p class="signin-prompt" id="signinPrompt">
      Please <a id="signinLink" href="#" target="_blank">sign in</a> to the app and set your LeetCode username in your profile to enable sync.
    </p>

    <button class="btn" id="syncBtn">
      <div class="btn-spin" id="btnSpinner" style="display:none;"></div>
      <svg id="btnIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
      </svg>
      <span id="btnLabel">Sync Now</span>
    </button>

    <div class="status idle" id="statusBox">
      <div class="status-dot"></div>
      <div class="status-spin"></div>
      <span id="statusText">Ready to sync</span>
    </div>

  </div>

  <div class="footer">
    <span>Vantage</span>
    <a id="openAppLink" href="#" target="_blank">Open App &#x2197;</a>
  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
